trigger:
- main
- rel/*

pr:
- main
- rel/*

stages:
- stage: Build
  jobs:
  - job: Build
    pool:
      vmImage: windows-latest

    variables: 
      BuildConfiguration: Release
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        useGlobalJson: true
      displayName: 'Use .NET SDK (global.json)'

    # Install SDKs needed for testing
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '8.x'
      displayName: 'Use .NET SDK (8.x)'

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '9.x'
      displayName: 'Use .NET SDK (9.x)'

    - script: dotnet tool restore
      displayName: Install dotnet tools

    - script: dotnet nbgv cloud
      displayName: Set Version

    - script: dotnet test dirs.proj
      displayName: Test

    - script: dotnet pack dirs.proj
      displayName: Create package(s)

    - publish: $(Build.ArtifactStagingDirectory)/Packages
      displayName: Publish build packages
      artifact: BuildPackages

  # Test on Linux (both glibc and musl) to verify hostfxr resolution works across distributions
  - job: TestLinux
    displayName: 'Test on Linux'
    pool:
      vmImage: ubuntu-latest

    strategy:
      matrix:
        Alpine:
          dockerImage: 'mcr.microsoft.com/dotnet/sdk:10.0-alpine'
          displayName: 'Alpine (musl)'
        Ubuntu:
          dockerImage: 'mcr.microsoft.com/dotnet/sdk:10.0'
          displayName: 'Ubuntu (glibc)'

    steps:
    - script: |
        docker run --rm -v "$(Build.SourcesDirectory):/src" -w /src $(dockerImage) sh -c '
          rm -rf src/*/obj tests/*/obj &&
          dotnet test tests/DotNet.ReproducibleBuilds.Tests/DotNet.ReproducibleBuilds.Tests.csproj --framework net8.0 &&
          dotnet test tests/DotNet.ReproducibleBuilds.Tests/DotNet.ReproducibleBuilds.Tests.csproj --framework net9.0 &&
          dotnet test tests/DotNet.ReproducibleBuilds.Tests/DotNet.ReproducibleBuilds.Tests.csproj --framework net10.0 &&
          dotnet test tests/DotNet.ReproducibleBuilds.Isolated.Tests/DotNet.ReproducibleBuilds.Isolated.Tests.csproj --framework net8.0 &&
          dotnet test tests/DotNet.ReproducibleBuilds.Isolated.Tests/DotNet.ReproducibleBuilds.Isolated.Tests.csproj --framework net9.0 &&
          dotnet test tests/DotNet.ReproducibleBuilds.Isolated.Tests/DotNet.ReproducibleBuilds.Isolated.Tests.csproj --framework net10.0
        '
      displayName: 'Test in $(displayName) Docker container'

# Keep signing variables in a separate stage
- stage: CodeSign
  condition: and(succeeded('Build'), not(eq(variables['build.reason'], 'PullRequest')))
  jobs:
  - job: CodeSign
    displayName: Code Signing
    pool:
      vmImage: windows-latest
    variables:
    - group: SignTool-DNF

    steps:
    - download: current
      artifact: BuildPackages

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        useGlobalJson: true
      displayName: 'Use .NET SDK (global.json)'

    - script: dotnet tool restore
      displayName: Install dotnet tools

    - pwsh: |
        dotnet sign code azure-key-vault `
        "**/*.nupkg" `
        --base-directory "$(Pipeline.Workspace)/BuildPackages" `
        --file-list "$(Build.SourcesDirectory)/config/filelist.txt" `
        --publisher-name "DotNet.ReproducibleBuilds" `
        --description "DotNet.ReproducibleBuilds" `
        --description-url "https://github.com/dotnet/reproducible-builds" `
        --azure-key-vault-tenant-id "$(SignTenantId)" `
        --azure-key-vault-client-id "$(SignClientId)" `
        --azure-key-vault-client-secret '$(SignClientSecret)' `
        --azure-key-vault-certificate "$(SignKeyVaultCertificate)" `
        --azure-key-vault-url "$(SignKeyVaultUrl)"
      displayName: Sign packages

    - publish: $(Pipeline.Workspace)/BuildPackages
      displayName: Publish Signed Packages
      artifact: SignedPackages
